name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  POSIX_UEFI_REPO: https://gitlab.com/bztsrc/posix-uefi.git
  DASH_REPO: https://github.com/tklauser/dash.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install cross toolchain (GNU-EFI target deps for POSIX-UEFI)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 make git

      - name: Fetch POSIX-UEFI
        run: |
          git clone --depth 1 "${POSIX_UEFI_REPO}" posix-uefi
          # POSIX-UEFI expects a "uefi/" symlink or copy at the project root
          cp -r posix-uefi/uefi ./uefi

      - name: Fetch dash source (reference tree for the integration patches)
        run: |
          git clone --depth 1 "${DASH_REPO}" dash-src

      - name: Build the process-compat shim standalone
        run: |
          # Compiles the shim + a trivial main() against POSIX-UEFI to
          # verify the shim itself is well-formed and the LoadImage/
          # StartImage calls resolve, independent of dash's own source
          # (which needs the eval.c/jobs.c redirects described in
          # patches/README.md before it will link against this shim).
          mkdir -p build/shim-check
          cp compat/uefi_process_compat.h compat/uefi_process_compat.c build/shim-check/
          cat > build/shim-check/main.c << 'EOF'
          #include <uefi.h>
          #include "uefi_process_compat.h"

          /* referenced so the linker resolves the shim's extern hooks;
             real implementations live in patches/shstate_bridge.c once
             wired against an actual dash source tree. */
          char_t *shstate_get_cwd(void) { return NULL; }
          int shstate_set_cwd(const char_t *cwd) { (void)cwd; return 0; }
          void *shstate_snapshot_vars(void) { return NULL; }
          void shstate_restore_vars(void *s) { (void)s; }
          void shstate_free_snapshot(void *s) { (void)s; }
          int shstate_redirect_stdout_to_buf(uefi_pipe_buf_t *b) { (void)b; return 0; }
          int shstate_redirect_stdin_from_buf(const uefi_pipe_buf_t *b) { (void)b; return 0; }
          void shstate_redirect_restore(void) {}

          int main(int argc, char **argv) {
              (void)argc; (void)argv;
              printf("uefi_process_compat shim: build OK\n");
              return 0;
          }
          EOF
          cat > build/shim-check/Makefile << 'EOF'
          TARGET = shimcheck.efi
          SRCS = main.c uefi_process_compat.c
          USE_GCC = 1
          include uefi/Makefile
          EOF
          ln -s "$(pwd)/uefi" build/shim-check/uefi
          cd build/shim-check && make

      - name: Upload built .efi
        uses: actions/upload-artifact@v4
        with:
          name: shimcheck-efi
          path: build/shim-check/shimcheck.efi

      - name: Note on full dash build
        run: |
          echo "::notice::This job verifies the compat shim compiles and links against POSIX-UEFI."
          echo "::notice::Building dash itself against this shim requires applying the jobs.c/eval.c"
          echo "::notice::redirects described in patches/README.md against dash-src/ — that step is"
          echo "::notice::intentionally not automated here since it depends on hand-mapping call sites"
          echo "::notice::to the dash version fetched above."
