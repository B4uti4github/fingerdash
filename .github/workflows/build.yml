name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  POSIX_UEFI_REPO: https://gitlab.com/bztsrc/posix-uefi.git
  OKSH_REPO: https://github.com/ibara/oksh.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 make git gcc

      - name: Fetch POSIX-UEFI
        run: |
          git clone --depth 1 "${POSIX_UEFI_REPO}" posix-uefi
          cp -r posix-uefi/uefi ./uefi

      - name: Fetch oksh source
        run: |
          git clone --depth 1 "${OKSH_REPO}" oksh-src

      - name: Prepare and Compile oksh with POSIX-UEFI
        run: |
          # 1. Crear directorio de trabajo limpio para el binario UEFI
          mkdir -p build/oksh-efi
          cp -r oksh-src/* build/oksh-efi/
          
          # 2. Copiar tu carpeta 'compat' si existe
          if [ -d "compat" ]; then cp -r compat/* build/oksh-efi/; fi
          
          # 3. Crear los stubs de estado necesarios para tu shim
          cat > build/oksh-efi/shstate_stubs.c << 'EOF'
          #include <uefi.h>
          #include <string.h>
          #include "uefi_process_compat.h"
          char_t *shstate_get_cwd(void) { return NULL; }
          int shstate_set_cwd(const char_t *cwd) { (void)cwd; return 0; }
          void *shstate_snapshot_vars(void) { return NULL; }
          void shstate_restore_vars(void *s) { (void)s; }
          void shstate_free_snapshot(void *s) { (void)s; }
          int shstate_redirect_stdout_to_buf(uefi_pipe_buf_t *b) { (void)b; return 0; }
          int shstate_redirect_stdin_from_buf(const uefi_pipe_buf_t *b) { (void)b; return 0; }
          void shstate_redirect_restore(void) {}
          EOF

          # 4. Inyectar macros de compatibilidad de OpenBSD y editores directo en sh.h
          echo '#define __dead' >> build/oksh-efi/sh.h
          echo '#define __RCSID(x)' >> build/oksh-efi/sh.h
          echo '#define EMACS 1' >> build/oksh-efi/sh.h
          echo '#define VI 1' >> build/oksh-efi/sh.h

          # 5. Generar un pconfig.h vacío para que portable.h deje de quejarse
          touch build/oksh-efi/pconfig.h

          # 6. Enlace simbólico del entorno uefi
          ln -s "$(pwd)/uefi" build/oksh-efi/uefi
          
          # 7. Crear el Makefile monolítico con las flags de descarte necesarias
          cat > build/oksh-efi/Makefile << 'EOF'
          TARGET = oksh.efi
          
          SRCS = alloc.c c_ksh.c c_sh.c c_test.c edit.c emacs.c eval.c exec.c \
                 expr.c history.c io.c jobs.c lex.c mail.c main.c misc.c \
                 path.c shf.c syn.c table.c trap.c tree.c tty.c var.c \
                 version.c vi.c unvis.c vis.c strlcpy.c strlcat.c \
                 uefi_process_compat.c shstate_stubs.c
          
          CFLAGS = -I. -DUEFI -D_GNU_SOURCE -fPIC \
                   -DKSH_SMALL -D_DIRENT_H_ -D_MONOTONIC_clock_gettime \
                   -DHAVE_CONFIG_H
          
          USE_GCC = 1
          
          include uefi/Makefile
          EOF
          
          # 8. Compilación directa limpia
          cd build/oksh-efi && make

      - name: Upload built .efi
        uses: actions/upload-artifact@v4
        with:
          name: oksh-uefi-binary
          path: build/oksh-efi/oksh.efi