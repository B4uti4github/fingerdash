name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  POSIX_UEFI_REPO: https://gitlab.com/bztsrc/posix-uefi.git
  BUSYBOX_REPO: https://github.com/mirror/busybox.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 make git gcc

      - name: Fetch POSIX-UEFI
        run: |
          git clone --depth 1 "${POSIX_UEFI_REPO}" posix-uefi
          cp -r posix-uefi/uefi ./uefi

      - name: Fetch BusyBox (for hush)
        run: |
          git clone --depth 1 "${BUSYBOX_REPO}" busybox-src

      - name: Prepare and Compile hush with POSIX-UEFI
        run: |
          # 1. Crear directorio de trabajo para hush-efi
          mkdir -p build/hush-efi
          
          # 2. Copiar los archivos fuente esenciales de la shell hush
          cp busybox-src/shell/hush.c build/hush-efi/
          
          # 3. Copiar tu carpeta 'compat' si existe
          if [ -d "compat" ]; then cp -r compat/* build/hush-efi/; fi
          
          # 4. Crear los stubs de estado necesarios para tu shim de procesos
          cat > build/hush-efi/shstate_stubs.c << 'EOF'
          #include <uefi.h>
          #include "uefi_process_compat.h"
          char_t *shstate_get_cwd(void) { return NULL; }
          int shstate_set_cwd(const char_t *cwd) { (void)cwd; return 0; }
          void *shstate_snapshot_vars(void) { return NULL; }
          void shstate_restore_vars(void *s) { (void)s; }
          void shstate_free_snapshot(void *s) { (void)s; }
          int shstate_redirect_stdout_to_buf(uefi_pipe_buf_t *b) { (void)b; return 0; }
          int shstate_redirect_stdin_from_buf(const uefi_pipe_buf_t *b) { (void)b; return 0; }
          void shstate_redirect_restore(void) {}
          EOF

          # 5. Crear un archivo de cabecera sintético para desactivar las dependencias de Linux y Unicode
          cat > build/hush-efi/busybox.h << 'EOF'
          #ifndef BUSYBOX_H
          #define BUSYBOX_H 1
          
          #define ENABLE_HUSH 1
          #define ENABLE_HUSH_INTERACTIVE 1
          #define ENABLE_HUSH_JOB 0
          #define ENABLE_HUSH_FAST 1
          
          /* Desactivar explícitamente Unicode en BusyBox */
          #define ENABLE_FEATURE_CHECK_UNICODE_IN_ENV 0
          #define ENABLE_UNICODE_SUPPORT 0
          #define ENABLE_UNICODE_USING_LOCALE 0
          
          #include <stdint.h>
          #include <stdlib.h>
          #include <stdio.h>
          #include <string.h>
          #include <unistd.h>
          
          #define barrier() __asm__ __volatile__("": : :"memory")
          
          #endif
          EOF

          # 6. Crear un unicode.h sintético vacío para saciar el #include "unicode.h"
          cat > build/hush-efi/unicode.h << 'EOF'
          #ifndef BB_UNICODE_H
          #define BB_UNICODE_H 1
          /* Vacío intencionalmente para compatibilidad UEFI sin dependencias */
          #define unicode_status 0
          #define init_unicode() ((void)0)
          #endif
          EOF

          # 7. Enlace simbólico del entorno uefi
          ln -s "$(pwd)/uefi" build/hush-efi/uefi
          
          # 8. Crear el Makefile standalone para hush.efi
          cat > build/hush-efi/Makefile << 'EOF'
          TARGET = hush.efi
          
          SRCS = hush.c uefi_process_compat.c shstate_stubs.c
          
          CFLAGS = -I. -DUEFI -D_GNU_SOURCE -fPIC \
                   -DBB_VER='"1.37.0-uefi"' -DAUTOCONF_TIMESTAMP='""'
          
          USE_GCC = 1
          
          include uefi/Makefile
          EOF
          
          # 9. Compilación limpia directa
          cd build/hush-efi && make

          
      - name: Upload built .efi
        uses: actions/upload-artifact@v4
        with:
          name: hush-uefi-binary
          path: build/hush-efi/hush.efi