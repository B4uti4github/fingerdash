name: Build FingerDash UEFI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  POSIX_UEFI_REPO: https://gitlab.com/bztsrc/posix-uefi.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 make git gcc

      - name: Fetch POSIX-UEFI
        run: |
          git clone --depth 1 "${POSIX_UEFI_REPO}" posix-uefi
          cp -r posix-uefi/uefi ./uefi

      - name: Prepare and Compile lsh with POSIX-UEFI
        run: |
          # 1. Crear directorio de trabajo para fingerdash-efi
          mkdir -p build/fingerdash-efi
          
          # 2. Copiar los archivos fuente de la shell lsh
          cp src/main.c build/fingerdash-efi/lsh.c
          cp src/uefi_process_compat.c build/fingerdash-efi/
          cp src/uefi_process_compat.h build/fingerdash-efi/
          
          # 3. Crear stubs de estado para el shim de procesos UEFI
          cat > build/fingerdash-efi/shstate_stubs.c << 'EOF'
          #include <uefi.h>
          #include "uefi_process_compat.h"
          char_t *shstate_get_cwd(void) { return NULL; }
          int shstate_set_cwd(const char_t *cwd) { (void)cwd; return 0; }
          void *shstate_snapshot_vars(void) { return NULL; }
          void shstate_restore_vars(void *s) { (void)s; }
          void shstate_free_snapshot(void *s) { (void)s; }
          int shstate_redirect_stdout_to_buf(uefi_pipe_buf_t *b) { (void)b; return 0; }
          int shstate_redirect_stdin_from_buf(const uefi_pipe_buf_t *b) { (void)b; return 0; }
          void shstate_redirect_restore(void) {}
          EOF

          # 4. Enlace simbólico del entorno uefi
          ln -s "$(pwd)/uefi" build/fingerdash-efi/uefi
          
          # 5. Crear el Makefile standalone para fingerdash.efi
          cat > build/fingerdash-efi/Makefile << 'EOF'
          TARGET = fingerdash.efi

          SRCS = lsh.c uefi_process_compat.c shstate_stubs.c
          
          CFLAGS = -I. -DUEFI -D_GNU_SOURCE -fPIC
          
          USE_GCC = 1
          
          include uefi/Makefile
          EOF
          
          # 6. Compilación
          cd build/fingerdash-efi && make

      - name: Upload built .efi
        uses: actions/upload-artifact@v4
        with:
          name: fingerdash-uefi-binary
          path: build/fingerdash-efi/fingerdash.efi