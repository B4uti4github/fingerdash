name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  POSIX_UEFI_REPO: https://gitlab.com/bztsrc/posix-uefi.git
  DASH_REPO: https://github.com/tklauser/dash.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install cross toolchain (GNU-EFI target deps for POSIX-UEFI)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 make git autoconf automake bison flex gcc

      - name: Fetch POSIX-UEFI
        run: |
          git clone --depth 1 "${POSIX_UEFI_REPO}" posix-uefi
          cp -r posix-uefi/uefi ./uefi

      - name: Fetch dash source
        run: |
          git clone --depth 1 "${DASH_REPO}" dash-src

      - name: Prepare and Compile Full Dash with POSIX-UEFI
        run: |
          # 1. Usamos el entorno nativo para disparar toda la generación de archivos .c/.h internos
          cd dash-src
          ./autogen.sh
          ./configure || true
          make || true
          cd ..

          # 2. Directorio de trabajo UEFI
          mkdir -p build/dash-efi
          cp -r dash-src/* build/dash-efi/
          
          # ¡CRUCIAL! Borramos los archivos .o viejos compilados para Linux sin -fPIC
          # Queremos conservar los .c y .h generados (como signames.c, builtins.c, etc.)
          find build/dash-efi -name "*.o" -type f -delete
          
          # 3. Copiar tu carpeta 'compat' si existe
          if [ -d "compat" ]; then cp -r compat/* build/dash-efi/; fi
          
          # 4. Crear los stubs de estado necesarios para tu shim
          cat > build/dash-efi/shstate_stubs.c << 'EOF'
          #include <uefi.h>
          #include <string.h>
          #include "uefi_process_compat.h"
          char_t *shstate_get_cwd(void) { return NULL; }
          int shstate_set_cwd(const char_t *cwd) { (void)cwd; return 0; }
          void *shstate_snapshot_vars(void) { return NULL; }
          void shstate_restore_vars(void *s) { (void)s; }
          void shstate_free_snapshot(void *s) { (void)s; }
          int shstate_redirect_stdout_to_buf(uefi_pipe_buf_t *b) { (void)b; return 0; }
          int shstate_redirect_stdin_from_buf(const uefi_pipe_buf_t *b) { (void)b; return 0; }
          void shstate_redirect_restore(void) {}
          EOF

          # 5. Enlace simbólico del entorno uefi
          ln -s "$(pwd)/uefi" build/dash-efi/uefi
          
          # 6. Crear el Makefile definitivo añadiendo src/signames.c y forzando la compilación limpia
          cat > build/dash-efi/Makefile << 'EOF'
          TARGET = dash.efi
          
          # Agregamos src/builtins.c y src/signames.c a la compilación nativa de UEFI
          SRCS = src/alias.c src/arith_yacc.c src/arith_yylex.c src/cd.c src/error.c \
                 src/eval.c src/exec.c src/expand.c src/histedit.c src/input.c \
                 src/jobs.c src/mail.c src/main.c src/memalloc.c src/miscbltin.c \
                 src/mystring.c src/options.c src/parser.c src/redir.c src/show.c \
                 src/trap.c src/output.c src/var.c \
                 src/init.c src/nodes.c src/syntax.c src/builtins.c src/signames.c \
                 uefi_process_compat.c shstate_stubs.c
          
          CFLAGS = -I. -Isrc -DUEFI -D_GNU_SOURCE -DHAVE_CONFIG_H -fPIC
          USE_GCC = 1
          
          include uefi/Makefile
          EOF
          
          # 7. Compilación final monolítica limpia
          cd build/dash-efi && make

      - name: Upload built .efi
        uses: actions/upload-artifact@v4
        with:
          name: dash-uefi-binary
          path: build/dash-efi/dash.efi